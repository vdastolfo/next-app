# =============================================
# NEXT - Configuración del servidor
# =============================================

# Puerto donde corre el backend
server.port=8080

# =============================================
# BASE DE DATOS - SQL Server Express
# =============================================
spring.datasource.url=jdbc:sqlserver://localhost;instanceName=SQLEXPRESS;databaseName=NextSubastas;encrypt=false;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=Next2026!

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# =============================================
# JWT
# =============================================
# Clave secreta para firmar los tokens (cambiar en producción)
jwt.secret=NextSubastasSecretKey2026SuperSeguraParaJWT
# Expiración del token: 24 horas en milisegundos
jwt.expiration=86400000

# =============================================
# CORS (permite que el frontend se conecte)
# =============================================
app.cors.allowed-origins=http://localhost:8081,exp://localhost:8081

# =============================================
# Tamaño máximo de archivos (para fotos)
# =============================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Nombre de la app
spring.application.name=next-subastas
